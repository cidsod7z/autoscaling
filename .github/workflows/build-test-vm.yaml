name: build-test-vm
'on':
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to use for the Docker images
        type: string
        required: true
  workflow_call:
    inputs:
      skip:
        description: Changes this action to perform a no-op
        type: boolean
        required: false
      tag:
        description: Tag to use for the Docker images
        type: string
        required: true
      upload-vm-builder:
        description: If true, upload vm-builder in an artifact
        type: boolean
        required: false
        default: false
      archs:
        description: Architecture to build for
        type: string
        required: false
        default: '["amd64","arm64"]'
    outputs:
      vm-postgres-16-bullseye:
        description: image name for postgres:16-bullseye, VM-ified
        value: ${{ jobs.tags.outputs.vm-postgres-16-bullseye }}
env:
  IMG_POSTGRES_16_BULLSEYE: neondatabase/vm-postgres-16-bullseye
  IMG_DAEMON: neondatabase/neonvm-daemon
  TARGET_ARCH: amd64
defaults:
  run:
    shell: bash -euo pipefail {0}
jobs:
  tags:
    outputs:
      vm-postgres-16-bullseye: ${{ steps.show-tags.outputs.vm-postgres-16-bullseye
        }}
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481
      with:
        egress-policy: audit
    - id: show-tags
      run: 'echo "vm-postgres-16-bullseye=${{ env.IMG_POSTGRES_16_BULLSEYE }}:${{
        inputs.tag }}" >> $GITHUB_OUTPUT

        '
  build:
    if: ${{ format('{0}', inputs.skip) != 'true' }}
    strategy:
      matrix:
        arch: ${{ fromJson(inputs.archs) }}
    runs-on: ubuntu-latest
    outputs:
      vm-postgres-16-bullseye: ${{ steps.tags.outputs.vm-postgres-16-bullseye }}
      daemon: ${{ steps.tags.outputs.daemon }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481
      with:
        egress-policy: audit
    - id: tags
      run: 'echo "vm-postgres-16-bullseye=${{ env.IMG_POSTGRES_16_BULLSEYE }}-${{
        matrix.arch }}:${{ inputs.tag }}" | tee -a $GITHUB_OUTPUT

        echo "daemon=${{ env.IMG_DAEMON }}-${{ matrix.arch }}:${{ inputs.tag }}" |
        tee -a $GITHUB_OUTPUT

        '
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b
      with:
        go-version-file: go.mod
        cache: false
      timeout-minutes: 10
    - name: Build daemon image
      run: make TARGET_ARCH=${{ matrix.arch }} docker-build-daemon
      env:
        IMG_DAEMON: ${{ steps.tags.outputs.daemon }}
    - run: make bin/vm-builder
      env:
        IMG_DAEMON: ${{ steps.tags.outputs.daemon }}
    - name: upload vm-builder
      if: ${{ format('{0}', inputs.upload-vm-builder) == 'true' }}
      uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1
      with:
        name: ${{ format('vm-builder-{0}', matrix.arch) }}
        path: bin/vm-builder
        if-no-files-found: error
        retention-days: 2
    - name: set custom docker config directory
      uses: neondatabase/dev-actions/set-docker-config-dir@6094485bf440001c94a94a3f9e221e81ff6b6193
    - name: login to docker hub
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
      with:
        username: ${{ secrets.NEON_DOCKERHUB_USERNAME }}
        password: ${{ secrets.NEON_DOCKERHUB_PASSWORD }}
    - name: Load base image tags and SHAs into env
      uses: ./.github/actions/deps-versions
      with:
        arch: ${{ matrix.arch }}
    - name: build ${{ steps.tags.outputs.vm-postgres-16-bullseye }}
      run: "./bin/vm-builder \\\n    -src postgres:16-bullseye \\\n    -dst ${{ steps.tags.outputs.vm-postgres-16-bullseye\
        \ }} \\\n    -daemon-image ${{ steps.tags.outputs.daemon }} \\\n    -build-arg\
        \ ALPINE_IMG_TAG=$ALPINE_IMG_TAG \\\n    -build-arg ALPINE_IMG_SHA=$ALPINE_IMG_SHA\
        \ \\\n    -build-arg RUST_IMG_TAG=$RUST_IMG_TAG \\\n    -build-arg RUST_IMG_SHA=$RUST_IMG_SHA\
        \ \\\n    -target-arch linux/${{ matrix.arch }} \\\n    -spec tests/e2e/image-spec.yaml\n"
    - name: docker push and annotate image ${{ steps.tags.outputs.vm-postgres-16-bullseye
        }}
      run: '# docker manifest command works only with remote images so we need to
        push the image first

        docker push ${{ steps.tags.outputs.vm-postgres-16-bullseye }}

        docker buildx imagetools inspect ${{ steps.tags.outputs.vm-postgres-16-bullseye
        }} --format ''{{ .Manifests }}''

        docker manifest create ${{ steps.tags.outputs.vm-postgres-16-bullseye }} ${{
        steps.tags.outputs.vm-postgres-16-bullseye }}

        docker manifest annotate ${{ steps.tags.outputs.vm-postgres-16-bullseye }}
        ${{ steps.tags.outputs.vm-postgres-16-bullseye }} --os linux --arch ${{ matrix.arch
        }}

        docker manifest push ${{ steps.tags.outputs.vm-postgres-16-bullseye }}

        '
  merge-vm-images:
    needs:
    - build
    runs-on: ubuntu-latest
    env:
      ARCHS: ${{ join(fromJson(inputs.archs), ' ') }}
      TAG: ${{ inputs.tag }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481
      with:
        egress-policy: audit
    - name: git checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: docker - setup buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2
    - name: login to docker hub
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
      with:
        username: ${{ secrets.NEON_DOCKERHUB_USERNAME }}
        password: ${{ secrets.NEON_DOCKERHUB_PASSWORD }}
    - name: Merge vm images
      id: merge-vm-images
      run: "result_image=\"${{ env.IMG_POSTGRES_16_BULLSEYE }}:${TAG}\"\n\nargs=(\"\
        -t\" \"${result_image}\")\nfor arch in ${ARCHS}; do\n  args+=(\"${{ env.IMG_POSTGRES_16_BULLSEYE\
        \ }}-${arch}:${TAG}\")\ndone\n\ndocker buildx imagetools create \"${args[@]}\"\
        \n"
